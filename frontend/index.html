<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AllyAI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #1d2433;
      --muted: #647084;
      --line: #dce3ee;
      --accent: #276ef1;
      --accent-dark: #1554c0;
      --danger: #c93a3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 320px;
      height: 100vh;
    }
    aside, main {
      min-height: 0;
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }
    .right {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    header {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1, h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }
    h2 { font-size: 15px; }
    button, input, textarea, select {
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button.primary:hover { background: var(--accent-dark); }
    button.danger {
      color: var(--danger);
    }
    .list, .memories, .messages {
      overflow-y: auto;
      padding: 12px;
    }
    .conversation, .memory {
      width: 100%;
      text-align: left;
      margin-bottom: 8px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
    }
    .conversation.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(39, 110, 241, .12);
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }
    main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
    }
    .bubble {
      max-width: min(760px, 86%);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .bubble.user {
      align-self: flex-end;
      background: #dfeaff;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
    }
    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    textarea, input, select {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      background: #fff;
      color: var(--ink);
      width: 100%;
    }
    textarea {
      min-height: 48px;
      max-height: 140px;
      resize: vertical;
    }
    .memory {
      display: grid;
      gap: 8px;
    }
    .tag {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .memory-form {
      padding: 12px;
      display: grid;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }
    @media (max-width: 980px) {
      body { overflow: auto; height: auto; }
      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }
      aside, .right {
        border: 0;
        border-bottom: 1px solid var(--line);
        max-height: 45vh;
      }
      main { min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header>
        <h1>AllyAI</h1>
        <button id="newChat">New</button>
      </header>
      <div id="conversations" class="list"></div>
    </aside>

    <main>
      <header>
        <h2 id="chatTitle">New conversation</h2>
        <button id="deleteChat" class="danger">Delete</button>
      </header>
      <div id="messages" class="messages"></div>
      <form id="chatForm" class="composer">
        <textarea id="messageInput" placeholder="Message AllyAI"></textarea>
        <button class="primary" type="submit">Send</button>
      </form>
    </main>

    <aside class="right">
      <header>
        <h2>Memory Vault</h2>
        <button id="refreshMemories">Refresh</button>
      </header>
      <form id="memoryForm" class="memory-form">
        <select id="memoryCategory">
          <option value="history">History</option>
          <option value="preferences">Preferences</option>
          <option value="projects">Projects</option>
          <option value="skills">Skills</option>
        </select>
        <input id="memoryContent" placeholder="Add a memory manually">
        <button type="submit">Add Memory</button>
      </form>
      <div id="memories" class="memories"></div>
    </aside>
  </div>

  <script>
    let activeConversationId = null;

    const conversationsEl = document.querySelector("#conversations");
    const messagesEl = document.querySelector("#messages");
    const memoriesEl = document.querySelector("#memories");
    const chatTitleEl = document.querySelector("#chatTitle");
    const messageInput = document.querySelector("#messageInput");

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!response.ok) {
        const error = await response.json().catch(() => ({ detail: response.statusText }));
        throw new Error(error.detail || "Request failed");
      }
      return response.json();
    }

    function renderMessages(messages) {
      messagesEl.innerHTML = "";
      for (const message of messages) {
        if (message.role === "system") continue;
        const bubble = document.createElement("div");
        bubble.className = `bubble ${message.role}`;
        bubble.textContent = message.content;
        messagesEl.appendChild(bubble);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadConversations() {
      const conversations = await api("/api/conversations");
      conversationsEl.innerHTML = "";
      for (const conversation of conversations) {
        const button = document.createElement("button");
        button.className = `conversation ${conversation.id === activeConversationId ? "active" : ""}`;
        button.innerHTML = `<strong>${conversation.title}</strong><div class="meta">${conversation.message_count} messages</div>`;
        button.addEventListener("click", () => openConversation(conversation.id));
        conversationsEl.appendChild(button);
      }
    }

    async function openConversation(id) {
      const conversation = await api(`/api/conversations/${id}`);
      activeConversationId = conversation.id;
      chatTitleEl.textContent = conversation.title;
      renderMessages(conversation.messages);
      await loadConversations();
    }

    async function loadMemories() {
      const memories = await api("/api/memories");
      memoriesEl.innerHTML = "";
      for (const memory of memories) {
        const item = document.createElement("div");
        item.className = "memory";
        item.innerHTML = `<div class="tag">${memory.category}</div><div>${memory.content}</div>`;
        const remove = document.createElement("button");
        remove.className = "danger";
        remove.textContent = "Delete";
        remove.addEventListener("click", async () => {
          await api(`/api/memories/${memory.id}`, { method: "DELETE" });
          await loadMemories();
        });
        item.appendChild(remove);
        memoriesEl.appendChild(item);
      }
    }

    document.querySelector("#newChat").addEventListener("click", async () => {
      const conversation = await api("/api/conversations", {
        method: "POST",
        body: JSON.stringify({ title: "New conversation" }),
      });
      await openConversation(conversation.id);
    });

    document.querySelector("#deleteChat").addEventListener("click", async () => {
      if (!activeConversationId) return;
      await api(`/api/conversations/${activeConversationId}`, { method: "DELETE" });
      activeConversationId = null;
      chatTitleEl.textContent = "New conversation";
      renderMessages([]);
      await loadConversations();
    });

    document.querySelector("#chatForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;
      messageInput.value = "";
      renderMessages([...[...messagesEl.children].map((node) => ({
        role: node.classList.contains("user") ? "user" : "assistant",
        content: node.textContent,
      })), { role: "user", content: message }]);
      try {
        const result = await api("/api/chat", {
          method: "POST",
          body: JSON.stringify({ message, conversation_id: activeConversationId }),
        });
        activeConversationId = result.conversation_id;
        await openConversation(activeConversationId);
        await loadMemories();
      } catch (error) {
        renderMessages([{ role: "assistant", content: error.message }]);
      }
    });

    document.querySelector("#memoryForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const content = document.querySelector("#memoryContent").value.trim();
      const category = document.querySelector("#memoryCategory").value;
      if (!content) return;
      await api("/api/memories", {
        method: "POST",
        body: JSON.stringify({ category, content }),
      });
      document.querySelector("#memoryContent").value = "";
      await loadMemories();
    });

    document.querySelector("#refreshMemories").addEventListener("click", loadMemories);

    loadConversations();
    loadMemories();
  </script>
</body>
</html>
